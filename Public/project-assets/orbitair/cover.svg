<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0f0d"/>
      <stop offset="100%" stop-color="#121c17"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ff66"/>
      <stop offset="100%" stop-color="#00bc8c"/>
    </linearGradient>
    <radialGradient id="radarSweep" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ff66" stop-opacity="0.15"/>
      <stop offset="80%" stop-color="#00ff66" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#00ff66" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="250" rx="8" fill="url(#bgGrad)"/>
  
  <!-- Outer Frame -->
  <rect x="15" y="15" width="370" height="220" rx="6" fill="none" stroke="rgba(0, 255, 102, 0.15)" stroke-width="1.5"/>

  <!-- Radar Circles -->
  <circle cx="200" cy="125" r="85" fill="none" stroke="rgba(0, 255, 102, 0.1)" stroke-width="1"/>
  <circle cx="200" cy="125" r="55" fill="none" stroke="rgba(0, 255, 102, 0.15)" stroke-width="1" stroke-dasharray="4, 4"/>
  <circle cx="200" cy="125" r="25" fill="none" stroke="rgba(0, 255, 102, 0.2)" stroke-width="1"/>
  <circle cx="200" cy="125" r="95" fill="url(#radarSweep)"/>

  <!-- Crosshairs -->
  <line x1="200" y1="30" x2="200" y2="220" stroke="rgba(0, 255, 102, 0.1)" stroke-width="1"/>
  <line x1="100" y1="125" x2="300" y2="125" stroke="rgba(0, 255, 102, 0.1)" stroke-width="1"/>

  <!-- Flight Telemetry Path -->
  <path d="M 110 70 Q 200 180, 290 80 T 360 160" fill="none" stroke="url(#accentGrad)" stroke-width="2" filter="drop-shadow(0 0 3px rgba(0,255,102,0.5))"/>
  
  <!-- Airplane Marker -->
  <g transform="translate(290, 80) rotate(-35)">
    <path d="M 0,-6 L 5,6 L 1,5 L 0,8 L -1,5 L -5,6 Z" fill="#ffffff"/>
  </g>
  <circle cx="290" cy="80" r="10" fill="none" stroke="#00ff66" stroke-width="1" opacity="0.6"/>

  <!-- Telemetry HUD Text -->
  <text x="25" y="40" fill="#00ff66" font-family="monospace" font-size="9" font-weight="bold">SYS.STATUS: TRACKING</text>
  <text x="25" y="52" fill="rgba(255, 255, 255, 0.5)" font-family="monospace" font-size="8">TARGETS ACTIVE: 142</text>
  
  <text x="310" y="40" fill="rgba(255, 255, 255, 0.5)" font-family="monospace" font-size="8" text-anchor="end">AZIMUTH: 284°</text>
  <text x="310" y="52" fill="rgba(255, 255, 255, 0.5)" font-family="monospace" font-size="8" text-anchor="end">ELEVATION: 12.4m</text>

  <!-- Density Grid Data visual -->
  <rect x="25" y="180" width="12" height="12" fill="rgba(0, 255, 102, 0.25)"/>
  <rect x="39" y="180" width="12" height="12" fill="rgba(0, 255, 102, 0.1)"/>
  <rect x="25" y="194" width="12" height="12" fill="rgba(0, 255, 102, 0.4)" stroke="#00ff66" stroke-width="1"/>
  <rect x="39" y="194" width="12" height="12" fill="rgba(0, 255, 102, 0.6)" stroke="#00ff66" stroke-width="1"/>
  <text x="56" y="202" fill="rgba(255, 255, 255, 0.4)" font-family="monospace" font-size="8">GRID_DENSITY_2D</text>

  <!-- Live coords ticker bottom right -->
  <text x="375" y="225" fill="#00ff66" font-family="monospace" font-size="9" text-anchor="end">[ 28.6139° N, 77.2090° E ]</text>
</svg>
